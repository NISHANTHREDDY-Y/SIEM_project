{% extends "base.html" %}

{% block content %}

<div class="panel">

    <h2>📜 Log Management</h2>

    <div class="table-container">

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Timestamp</th>
                <th>Event Type</th>
                <th>User</th>
                <th>Source</th>
            </tr>

            </thead>

            <tbody>

            {% for log in logs %}

            <tr>

                <td>{{ log["id"] }}</td>
                <td>{{ log["timestamp"] }}</td>
                <td>{{ log["event_type"] }}</td>
                <td>{{ log["username"] }}</td>
                <td>{{ log["source"] }}</td>

            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
