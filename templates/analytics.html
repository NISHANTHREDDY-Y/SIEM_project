{% extends "base.html" %}

{% block content %}

<div class="panel">

    <h2>📈 Security Analytics</h2>

    <div class="chart-container">

        <canvas id="alertsChart"></canvas>

    </div>

</div>

<div class="panel">

    <h2>📊 SIEM Statistics</h2>

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Logs</h3>
            <p>{{ logs|length }}</p>
        </div>

        <div class="stat-card">
            <h3>Total Alerts</h3>
            <p>{{ alerts|length }}</p>
        </div>

    </div>

</div>

{% endblock %}
